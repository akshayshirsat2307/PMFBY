name: Scrape PMFBY Dashboard

on:
  schedule:
    - cron: "0 3 * * 1"   # Run at 03:00 UTC, only on Monday — adjust as needed
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape_pmfby.py
        # No --output given: the script auto-generates
        # data/pmfby_dashboard_<UTC timestamp>.csv for this run.

      - name: Commit CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Add PMFBY dashboard data ($(date -u +%Y-%m-%d))"
          git push
