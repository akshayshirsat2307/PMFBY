name: Scrape PMFBY Dashboard

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC — adjust as needed
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scrape_pmfby.py --output pmfby_dashboard.csv

      - name: Commit CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pmfby_dashboard.csv
          git diff --cached --quiet || git commit -m "Update PMFBY dashboard data ($(date -u +%Y-%m-%d))"
          git push
